# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

# Use custom format
format = """
[╭─](bold blue)\
$username\
$hostname\
$directory\
$git_branch\
$git_status\
$nodejs\
$python\
$docker_context\
$kubernetes\
[╰─](bold blue)\
$character"""

# Disable the package module, hiding it from the prompt
[package]
disabled = true

# Use custom prompt character
[character]
success_symbol = "[❯](purple)"
error_symbol = "[❯](red)"
vimcmd_symbol = "[❮](green)"

# Use custom directory style
[directory]
style = "cyan bold"
read_only = " 🔒"

# Use custom git status style
[git_status]
style = "green"
ahead = "⇡"
behind = "⇣"
diverged = "⇕"
renamed = "➜"
deleted = "✖"
stashed = "📦"
modified = "●"
staged = "✓"
conflicted = "!"
untracked = "?"
deleted = "✖" 