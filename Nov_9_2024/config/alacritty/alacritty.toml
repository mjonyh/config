# [["default paste binding"]]
# action = "Paste"
# key = "V"
# mods = "Control|Shift"

[cursor]
style = "Block"
unfocused_hollow = true

[font.bold]
family = "Hack Nerd Font"
style = "Bold"

[font.bold_italic]
family = "Hack Nerd Font"
style = "Bold Italic"

[font.italic]
family = "Hack Nerd Font"
style = "Italic"

[font.normal]
family = "Hack Nerd Font"
style = "Regular"

[font]
size = 10

